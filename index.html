<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidekick Music Interface</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: black;
            color: white;
            cursor: pointer;
            position: fixed;
        }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            /* Fade transition on the intro screen itself */
            transition: opacity 1s ease-out;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #intro-text {
            font-size: 22px;
            line-height: 1.5;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.25);
            animation: fadeIn 1.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- MAIN APPLICATION (Hidden Initially) --- */
        #main-app {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* --- BACKGROUND GIF --- */
        #app-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.gif');
            background-size: cover;
            background-position: center;
            z-index: 0;
            animation: bgSpeed 1s linear infinite;
        }
        
        /* --- DIMMED OVERLAY (Paused State) --- */
        #app-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            z-index: 1;
            transition: background-color 0.5s ease;
            pointer-events: none;
        }
        
        #app-container.paused::before {
            animation: bgSpeed 2s linear infinite;
        }
        
        #app-container.paused::after {
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        @keyframes bgSpeed {
            from { background-position: 0 0; }
            to { background-position: 0 0; }
        }

        /* --- PHONE CONTAINER & OVERLAY GIF --- */
        #phone-container {
            position: relative;
            width: 100vw;
            max-width: 691px;
            height: auto;
            z-index: 2;
            container-type: inline-size;
            margin: 0;
            filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.3));
        }

        #overlay-gif {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* --- PLAYER DISPLAY (Replaces Start Prompt) --- */
        #player-display {
            position: absolute;
            top: calc(50% + 250px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            width: 80%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        #track-info {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.4), 2px 2px 4px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            display: none; /* Hidden until playback */
        }
        
        #progress-bar {
            width: 0%;
            height: 100%;
            /* 50% Opaque Rainbow Animation */
            background-color: rgba(0, 255, 0, 0.5);
            animation: rainbowPulse 2s infinite linear;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        /* --- START PROMPT --- */
        #start-prompt {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.4), 2px 2px 4px rgba(0,0,0,0.5);
            animation: smoothPulse 2s infinite ease-in-out;
            transition: opacity 0.5s ease; 
            text-transform: uppercase;
        }
        
        @keyframes smoothPulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* --- VOLUME DISPLAY --- */
        #volume-display {
            position: absolute;
            top: calc(50% - 250px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            font-size: 18px;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            background-color: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            display: none;
        }

        /* --- CONTROLS POSITIONING --- */
        .controls-wrapper {
            position: absolute;
            bottom: 15%; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30cqw;
            align-items: center;
            z-index: 20;
        }

        /* --- DIRECTIONAL PAD (D-PAD) --- */
        #dpad {
            width: 9cqw;
            height: 9cqw;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            opacity: 0.6;
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            position: relative;
            left: -21cqw;
            top: -7.5cqw;
        }

        @media (min-width: 1024px) {
            #dpad {
                left: -19cqw;
            }
        }

        .dpad-btn {
            background-color: transparent;
            cursor: pointer;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* --- WHITE TRIANGLES --- */
        .triangle {
            width: 0;
            height: 0;
            border-style: solid;
        }
        #dpad-up .triangle { border-width: 0 3px 5px 3px; border-color: transparent transparent white transparent; }
        #dpad-down .triangle { border-width: 5px 3px 0 3px; border-color: white transparent transparent transparent; }
        #dpad-left .triangle { border-width: 3px 5px 3px 0; border-color: transparent white transparent transparent; }
        #dpad-right .triangle { border-width: 3px 0 3px 5px; border-color: transparent transparent transparent white; }
        
        #dpad-up { 
            grid-area: up; 
            position: relative;
            top: -0.5cqw;
        }
        #dpad-down { grid-area: down; }
        #dpad-left { grid-area: left; }
        #dpad-right { grid-area: right; }

        /* --- TRACKBALL BUTTON --- */
        #trackball-btn {
            width: 3.75cqw;
            height: 3.75cqw;
            background-color: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            border-radius: 50%;
            border: 0.5cqw solid rgba(255,255,255,0.3);
            position: relative;
            right: -14.26cqw; 
            top: -8cqw;
        }
        
        #trackball-btn.pulse {
            animation: trackballPulse 1.5s infinite ease-in-out;
        }
        
        @keyframes trackballPulse {
            0% { background-color: rgba(255, 255, 255, 0.1); }
            50% { background-color: rgba(255, 255, 255, 0.3); }
            100% { background-color: rgba(255, 255, 255, 0.1); }
        }
        
        #trackball-btn:active, #trackball-btn:hover {
            animation: hoverRainbowFill 2.4s infinite linear;
        }
        
        #trackball-btn.playing {
            animation: rainbowFill 1.2s infinite linear;
        }

        /* --- RAINBOW ANIMATIONS --- */
        @keyframes rainbowFill {
            0% { background-color: rgba(255, 0, 0, 0.4); }
            15% { background-color: rgba(255, 165, 0, 0.4); }
            30% { background-color: rgba(255, 255, 0, 0.4); }
            45% { background-color: rgba(0, 255, 0, 0.4); }
            60% { background-color: rgba(0, 0, 255, 0.4); }
            75% { background-color: rgba(75, 0, 130, 0.4); }
            90% { background-color: rgba(238, 130, 238, 0.4); }
            100% { background-color: rgba(255, 0, 0, 0.4); }
        }
        
        @keyframes hoverRainbowFill {
            0% { background-color: rgba(255, 0, 0, 0.1); }
            15% { background-color: rgba(255, 165, 0, 0.1); }
            30% { background-color: rgba(255, 255, 0, 0.1); }
            45% { background-color: rgba(0, 255, 0, 0.1); }
            60% { background-color: rgba(0, 0, 255, 0.1); }
            75% { background-color: rgba(75, 0, 130, 0.1); }
            90% { background-color: rgba(238, 130, 238, 0.1); }
            100% { background-color: rgba(255, 0, 0, 0.1); }
        }
        
        @keyframes rainbowPulse {
            0% { background-color: rgba(255, 0, 0, 0.5); }
            15% { background-color: rgba(255, 165, 0, 0.5); }
            30% { background-color: rgba(255, 255, 0, 0.5); }
            45% { background-color: rgba(0, 255, 0, 0.5); }
            60% { background-color: rgba(0, 0, 255, 0.5); }
            75% { background-color: rgba(75, 0, 130, 0.5); }
            90% { background-color: rgba(238, 130, 238, 0.5); }
            100% { background-color: rgba(255, 0, 0, 0.5); }
        }

    </style>
</head>
<body>

    <div id="intro-screen">
        <div id="intro-text">
            hi! you've been selected to preview my album!<br><br>
            press anywhere to enter :)
        </div>
    </div>

    <div id="main-app">
        <div id="app-container" class="paused">
            
            <div id="phone-container">
                <img id="overlay-gif" src="overlay.gif" alt="Phone">
                
                <div class="controls-wrapper">
                    <div id="dpad">
                        <button id="dpad-up" class="dpad-btn" title="Volume Up"><div class="triangle"></div></button>
                        <button id="dpad-down" class="dpad-btn" title="Volume Down"><div class="triangle"></div></button>
                        <button id="dpad-left" class="dpad-btn" title="Previous Track"><div class="triangle"></div></button>
                        <button id="dpad-right" class="dpad-btn" title="Next Track"><div class="triangle"></div></button>
                    </div>
                    
                    <div id="trackball-btn" class="pulse" title="Play/Pause"></div>
                </div>
            </div>
            
            <div id="player-display">
                <div id="start-prompt">push trackball to start</div>
                <div id="track-info">TRACK: 1</div>
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>
            
            <div id="volume-display">VOL: 100%</div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const songFiles = ["song1.mp3", "song2.mp3", "song3.mp3", "song4.mp3", "song5.mp3"];
        const audioPlayer = document.getElementById('audio-player');
        const trackballBtn = document.getElementById('trackball-btn');
        const startPrompt = document.getElementById('start-prompt');
        const appContainer = document.getElementById('app-container');
        const introScreen = document.getElementById('intro-screen');
        const mainApp = document.getElementById('main-app');
        const volumeDisplay = document.getElementById('volume-display');
        
        // Progress Bar Elements
        const trackInfo = document.getElementById('track-info');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        
        // D-Pad Elements
        const dpadUp = document.getElementById('dpad-up');
        const dpadDown = document.getElementById('dpad-down');
        const dpadLeft = document.getElementById('dpad-left');
        const dpadRight = document.getElementById('dpad-right');
        
        let currentSongIndex = 0;
        let hasStarted = false;
        let volumeTimeout;

        // --- INTRO SCREEN LOGIC ---
        function startApp() {
            if (introScreen.style.display !== 'none') {
                // Fade out the intro screen
                introScreen.style.opacity = '0';
                
                // Show main app immediately
                mainApp.style.display = 'block';
                
                // Remove intro screen from DOM after transition
                setTimeout(() => {
                    introScreen.style.display = 'none';
                }, 1000);
            }
        }

        document.addEventListener('keydown', startApp);
        document.addEventListener('touchstart', startApp);
        document.addEventListener('click', startApp);

        // --- LOAD SONG FUNCTION ---
        function loadSong(index) {
            audioPlayer.src = `snippets/${songFiles[index]}`;
            trackInfo.innerText = `TRACK: ${index + 1}`;
        }

        // --- UPDATE INTERFACE STATE ---
        function updateInterfaceState() {
            if (audioPlayer.paused) {
                trackballBtn.classList.remove('playing');
                appContainer.classList.add('paused');
                if (hasStarted) trackballBtn.classList.add('pulse');
            } else {
                trackballBtn.classList.add('playing');
                trackballBtn.classList.remove('pulse');
                appContainer.classList.remove('paused');
                
                if (!hasStarted) {
                    // Hide prompt, show progress bar
                    startPrompt.style.opacity = '0'; 
                    setTimeout(() => {
                        startPrompt.style.display = 'none';
                        progressContainer.style.display = 'block';
                        trackInfo.style.opacity = '1';
                    }, 500);
                    hasStarted = true;
                }
            }
        }

        // --- PROGRESS BAR UPDATE ---
        audioPlayer.ontimeupdate = () => {
            if (audioPlayer.duration) {
                const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.style.width = `${progressPercent}%`;
            }
        };

        // --- SHOW VOLUME DISPLAY ---
        function showVolume() {
            volumeDisplay.innerText = `VOL: ${Math.round(audioPlayer.volume * 100)}%`;
            volumeDisplay.style.display = 'block';
            
            clearTimeout(volumeTimeout);
            volumeTimeout = setTimeout(() => {
                volumeDisplay.style.display = 'none';
            }, 2000);
        }

        // --- PLAY/PAUSE LOGIC ---
        trackballBtn.onclick = (e) => {
            e.stopPropagation();
            if (audioPlayer.paused) {
                if (!audioPlayer.src) loadSong(currentSongIndex);
                audioPlayer.play();
            } else {
                audioPlayer.pause();
            }
            updateInterfaceState();
        };

        // --- AUTO-PLAY NEXT SONG ---
        audioPlayer.onended = () => {
            currentSongIndex = (currentSongIndex + 1) % songFiles.length;
            loadSong(currentSongIndex);
            audioPlayer.play();
            updateInterfaceState();
        };

        // --- D-PAD LOGIC ---
        dpadLeft.onclick = (e) => {
            e.stopPropagation();
            currentSongIndex = (currentSongIndex - 1 + songFiles.length) % songFiles.length;
            loadSong(currentSongIndex);
            audioPlayer.play();
            updateInterfaceState();
        };

        dpadRight.onclick = (e) => {
            e.stopPropagation();
            currentSongIndex = (currentSongIndex + 1) % songFiles.length;
            loadSong(currentSongIndex);
            audioPlayer.play();
            updateInterfaceState();
        };

        dpadUp.onclick = (e) => {
            e.stopPropagation();
            if (audioPlayer.volume < 1.0) {
                audioPlayer.volume = Math.min(1.0, audioPlayer.volume + 0.1);
                showVolume();
            }
        };

        dpadDown.onclick = (e) => {
            e.stopPropagation();
            if (audioPlayer.volume > 0.0) {
                audioPlayer.volume = Math.max(0.0, audioPlayer.volume - 0.1);
                showVolume();
            }
        };

        loadSong(currentSongIndex);
    </script>
</body>
</html>
